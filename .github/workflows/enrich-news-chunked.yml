name: Chunked Google News enrichment

# Fan-out version of enrich-news.yml. Runs N parallel chunk jobs that each
# handle a stride of addresses, then a final job merges the per-chunk files
# into related_news.json and commits once.
#
# Use when the single-run weekly cron is bumping against the 240-min cap, or
# when you want a faster wall-time (typically ~30 min for the full corpus
# vs ~3h sequential).

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated: google,gdelt (default: both)"
        required: false
        default: "google,gdelt"
      since_days:
        description: "Only addresses scraped in last N days (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # Hard-coded matrix size. Keep this in sync with the matrix.chunk list below.
  CHUNK_COUNT: 6

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false   # let other chunks finish even if one stalls
      matrix:
        chunk: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser==6.0.11 python-dateutil==2.9.0.post0

      - name: Run chunk ${{ matrix.chunk }}
        run: |
          ARGS="--chunk-index ${{ matrix.chunk }} --chunk-count ${{ env.CHUNK_COUNT }}"
          if [ -n "${{ inputs.since_days }}" ]; then
            ARGS="$ARGS --since ${{ inputs.since_days }}"
          fi
          if [ -n "${{ inputs.sources }}" ]; then
            ARGS="$ARGS --sources ${{ inputs.sources }}"
          fi
          python enrich_news.py $ARGS

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: related_news.chunk${{ matrix.chunk }}.json
          retention-days: 1

  merge:
    needs: enrich
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()  # run merge even if one chunk failed; we'll commit what we have
    steps:
      - uses: actions/checkout@v4

      - name: Download chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          path: .
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge chunks
        id: merge
        run: python merge_chunks.py

      - name: Commit consolidated related_news.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add related_news.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: chunked enrichment +${{ steps.merge.outputs.added || '0' }} articles [skip ci]"
          # Rebase to avoid races with concurrent daily-scrape pushes.
          git pull --rebase origin main || true
          git push
