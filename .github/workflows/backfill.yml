name: Historical backfill

on:
  workflow_dispatch:
    inputs:
      start_month:
        description: "Start month (YYYY-MM, inclusive)"
        required: true
        default: "2025-08"
      end_month:
        description: "End month (YYYY-MM, inclusive). Blank = current month."
        required: false
        default: ""
      dry_run:
        description: "Dry run (collect URLs, don't write)"
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GH Actions max is 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run backfill
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB: ${{ vars.SHEET_TAB || 'Sheet1' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS="--start ${{ inputs.start_month }}"
          if [ -n "${{ inputs.end_month }}" ]; then
            ARGS="$ARGS --end ${{ inputs.end_month }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python backfill.py $ARGS
