name: Daily YIMBY scrape

on:
  schedule:
    # 12:00 UTC = 08:00 ET (DST) / 07:00 ET (standard). Adjust if you want a different hour.
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          YIMBY_FEED_URL: ${{ secrets.YIMBY_FEED_URL }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB: ${{ vars.SHEET_TAB || 'Sheet1' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MAX_AGE_DAYS: ${{ vars.MAX_AGE_DAYS || '30' }}
        run: python scrape.py
